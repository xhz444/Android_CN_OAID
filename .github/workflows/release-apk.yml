name: Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Show project structure
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f | sort | head -300

      - name: Show Gradle tasks
        run: ./gradlew tasks --all

      - name: Build Release APK
        run: ./gradlew clean assembleRelease --info --warning-mode all --stacktrace

      - name: Find APK files
        run: |
          echo "APK files:"
          find . -type f -name "*.apk" -print

      - name: Store android package
        uses: actions/upload-artifact@v4
        with:
          name: Android_CN_OAID-release-apk
          path: |
            app/build/outputs/apk/pub/release/*.apk
            app/build/outputs/apk/**/*.apk
            **/build/outputs/apk/**/*.apk
          if-no-files-found: warn
          retention-days: 7
